<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Super Smash Shooter - Boss AI Edition</title>
    <style>
        body {
            margin: 0;
            background: #0b0e14;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            overflow: hidden;
        }
        h2 {
            text-shadow: 0 0 10px #00f0ff;
            font-size: 28px;
            margin-top: 40px;
        }
        .menu-btn {
            background: linear-gradient(135deg, #1f2d3d, #0d1520);
            color: white;
            border: 2px solid #00f0ff;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: 0.2s;
        }
        .menu-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            transform: scale(1.05);
        }
        #menu { margin-top: 80px; }
        canvas {
            display: block;
            margin: 10px auto;
            border: 3px solid #3a4750;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .controls { color: #8a99a8; font-size: 15px; }
        .controls b { color: #fff; background: #333; padding: 2px 6px; border-radius: 4px; }
        
        #restartMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(11, 14, 20, 0.95);
            border: 3px solid #00f0ff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
            display: none;
        }
        .btn {
            background: linear-gradient(135deg, #00f0ff, #007799);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- 1. HOOFDMENU -->
    <div id="menu">
        <h2>SUPER SMASH SHOOTER</h2>
        <p style="color: #ff3333; font-weight: bold; font-size: 18px;">WAARSCHUWING: DE BOT IS NU INTENS STERK & DEELT HARDE KLAPPEN UIT!</p>
        <button class="menu-btn" style="border-color: #00FF00;" onclick="selectCharacter('Gunner')">🔫 GLITCH-GUNNER</button>
        <button class="menu-btn" style="border-color: #00FFFF;" onclick="selectCharacter('Swordfighter')">⚔️ SWORD-FIGHTER</button>
        <button class="menu-btn" style="border-color: #FFA500;" onclick="selectCharacter('Brawler')">🥊 CYBER-BRAWLER</button>
    </div>

    <!-- 2. SPELSCHERM -->
    <div id="gameUi" style="display: none;">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <p class="controls">Besturing: <b>A / D</b> = Lopen | <b>W</b> = Springen (Druk 2x voor dubbele sprong) | <b>Spatiebalk</b> = Aanvallen</p>
    </div>

    <!-- 3. RESTART MENU -->
    <div id="restartMenu">
        <h2 id="winnerText" style="font-size: 28px; margin-top: 0;">GAME OVER</h2>
        <button class="btn" onclick="backToMenu()">🎮 TERUG NAAR MENU</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gravity = 0.5;
let gameActive = false;
let currentType = "Gunner";

// Jouw eigenschappen (iets verlaagd zodat je de bot niet in 2 klappen doodt)
const charTypes = {
    Gunner: { damage: 8, knockback: 0.08, color: "#00FF00" },
    Swordfighter: { damage: 14, knockback: 0.12, color: "#00FFFF" },
    Brawler: { damage: 22, knockback: 0.18, color: "#FFA500" }
};

const platforms = [
    { x: 150, y: 380, w: 600, h: 30 },
    { x: 200, y: 240, w: 180, h: 12 },
    { x: 520, y: 240, w: 180, h: 12 }
];

const player = {
    x: 250, y: 200, w: 30, h: 40, speed: 5.5, speedY: 0, isGrounded: false, 
    jumpsLeft: 2, percentage: 0, hitstunt: 0, facing: 1, score: 0, isAttacking: 0
};

// De Bot is nu sneller (speed 3.0) en heeft kortere cooldowns
const enemy = {
    x: 580, y: 200, w: 30, h: 40, color: "#FF3333", speed: 3.0, speedY: 0, speedX: 0, 
    isGrounded: false, percentage: 0, isFlying: false, score: 0, attackCooldown: 0
};

let bullets = [];
let particles = [];
let hitEffects = [];
let keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.code] = true;
    if (!gameActive) return;

    if ((e.code === "KeyW" || e.code === "ArrowUp") && player.hitstunt <= 0) {
        if (player.isGrounded) {
            player.speedY = -11.5; player.isGrounded = false; player.jumpsLeft = 1;
            spawnParticle(player.x + player.w/2, player.y + player.h, "#00f0ff", 8, 2);
        } else if (player.jumpsLeft > 0) {
            player.speedY = -10; player.jumpsLeft = 0;
            spawnParticle(player.x + player.w/2, player.y + player.h, "#FFFF00", 15, 4);
        }
    }

    if (e.code === "Space" && player.hitstunt <= 0) {
        player.isAttacking = 8;
        executeAttack();
    }
});
window.addEventListener("keyup", (e) => keys[e.code] = false);

function selectCharacter(type) {
    currentType = type;
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameUi").style.display = "block";
    resetPositions();
    gameActive = true;
    if(!window.gameLoopStarted) {
        window.gameLoopStarted = true;
        gameLoop();
    }
}

function executeAttack() {
    let stats = charTypes[currentType];
    if (currentType === "Gunner") {
        bullets.push({ 
            x: player.facing === 1 ? player.x + player.w : player.x - 15, 
            y: player.y + 15, vx: player.facing * 14, w: 15, h: 6, color: stats.color 
        });
    } else {
        let range = currentType === "Swordfighter" ? 65 : 45;
        let attackX = player.facing === 1 ? player.x + player.w : player.x - range;
        if (attackX < enemy.x + enemy.w && attackX + range > enemy.x && player.y < enemy.y + enemy.h && player.y + player.h > enemy.y) {
            triggerHit(stats.damage, stats.knockback, stats.color);
        }
    }
}

// Jouw hit op de bot (de bot heeft nu een 'demper' waardoor hij minder hard wegvliegt)
function triggerHit(damage, knockbackFactor, color) {
    enemy.percentage += damage;
    let dir = player.x < enemy.x ? 1 : -1;
    // De bot is 'zwaarder' gemaakt door de vermenigvuldiging met 0.65, hij vliegt dus minder snel ver weg!
    enemy.speedX = dir * (4 + (enemy.percentage * knockbackFactor)) * 0.65;
    enemy.speedY = -3.5 - (enemy.percentage * 0.02);
    enemy.isFlying = true;
    enemy.isGrounded = false;

    hitEffects.push({ x: enemy.x + enemy.w/2, y: enemy.y + enemy.h/2, radius: 45, timer: 10, color: color });
    spawnParticle(enemy.x + enemy.w/2, enemy.y + enemy.h/2, color, 14, 5);
}

function spawnParticle(x, y, color, count=5, speed=3) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y, vx: (Math.random() - 0.5) * speed, vy: (Math.random() - 0.5) * speed,
            radius: Math.random() * 3 + 1, color: color, alpha: 1, life: 20
        });
    }
}

function checkPlatformCollision(obj, oldY) {
    let hitPlatform = false;
    for (let p of platforms) {
        if (obj.x + obj.w > p.x && obj.x < p.x + p.w) {
            if (oldY + obj.h <= p.y && obj.y + obj.h >= p.y) {
                obj.y = p.y - obj.h; obj.speedY = 0; hitPlatform = true;
            }
        }
    }
    if (hitPlatform) {
        obj.isGrounded = true;
        if(obj === player) player.jumpsLeft = 2;
    }
}

function update() {
    if (!gameActive) return;

    if (player.isAttacking > 0) player.isAttacking--;

    // --- SPELER ---
    let oldPlayerY = player.y;
    if (player.hitstunt > 0) player.hitstunt--;

    if (player.hitstunt <= 0) {
        if (keys["ArrowLeft"] || keys["KeyA"]) { player.x -= player.speed; player.facing = -1; }
        if (keys["ArrowRight"] || keys["KeyD"]) { player.x += player.speed; player.facing = 1; }
    }
    player.speedY += gravity; player.y += player.speedY;
    player.isGrounded = false;
    checkPlatformCollision(player, oldPlayerY);

    // --- GEUPLOADE BOSS AI BOT ---
    let oldEnemyY = enemy.y;
    if (!enemy.isFlying) {
        if (enemy.x < player.x) enemy.x += enemy.speed;
        else if (enemy.x > player.x) enemy.x -= enemy.speed;

        if (player.y < enemy.y - 40 && enemy.isGrounded && Math.random() < 0.07) {
            enemy.speedY = -12; enemy.isGrounded = false;
        }
        
        if (Math.abs(enemy.x - player.x) < 150 && enemy.isGrounded && Math.random() < 0.02) {
            enemy.speedY = -11; enemy.isGrounded = false;
        }

        // AANVAL VAN DE BOT OP JOU (Super sterk gemaakt!)
        if (Math.abs(enemy.x - player.x) < 35 && Math.abs(enemy.y - player.y) < 35) {
            if (enemy.attackCooldown <= 0) {
                player.percentage += 20; // Deelt direct 20% schade uit per klap!
                player.hitstunt = 18; // Je bent flink lang verlamd
                
                let dir = enemy.x < player.x ? 1 : -1;
                // ENORME DUW KRACHT (KNOCKBACK): De bot duwt jou nu KEIHARD weg!
                player.speedY = -7.5; 
                player.x += dir * (10 + player.percentage * 0.45); // Gigantische duw-factor (0.45)
                
                hitEffects.push({ x: player.x + player.w/2, y: player.y + player.h/2, radius: 55, timer: 12, color: "#FF3333" });
                spawnParticle(player.x + player.w/2, player.y + player.h/2, "#FF3333", 15, 6);
                
                enemy.attackCooldown = 15; // Korte cooldown, hij start meteen een nieuwe combo!
            }
        }
    } else {
        enemy.x += enemy.speedX; enemy.speedX *= 0.97; // Bot remt iets trager af in de lucht
        if (Math.abs(enemy.speedX) > 2) spawnParticle(enemy.x + enemy.w/2, enemy.y + enemy.h/2, "#FF5555", 1, 1);
        if (Math.abs(enemy.speedX) < 0.2) enemy.isFlying = false;
    }
    
    if (enemy.attackCooldown > 0) enemy.attackCooldown--;
    
    enemy.speedY += gravity; enemy.y += enemy.speedY;
    enemy.isGrounded = false;
    checkPlatformCollision(enemy, oldEnemyY);

    // --- KOGELS ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i]; b.x += b.vx;
        if (b.x < enemy.x + enemy.w && b.x + b.w > enemy.x && b.y < enemy.y + enemy.h && b.y + b.h > enemy.y) {
            triggerHit(charTypes["Gunner"].damage, charTypes["Gunner"].knockback, b.color);
            bullets.splice(i, 1); continue;
        }
        if (b.x > canvas.width || b.x < -20) bullets.splice(i, 1);
    }

    // Effecten
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--; p.alpha = p.life / 20;
        if(p.life <= 0) particles.splice(i, 1);
    }
    for(let i = hitEffects.length - 1; i >= 0; i--) {
        hitEffects[i].timer--; if(hitEffects[i].timer <= 0) hitEffects.splice(i, 1);
    }

    // --- ARENA GRENZEN ---
    if (enemy.x > canvas.width + 60 || enemy.x < -90 || enemy.y > canvas.height + 60) {
        player.score++; endRound("JIJ HEBT GEWONNEN! 🎉");
    }
    if (player.x > canvas.width + 60 || player.x < -90 || player.y > canvas.height + 60) {
        enemy.score++; endRound("DE BOT HEEFT GEWONNEN! 🤖");
    }
}

function endRound(text) {
    gameActive = false;
    document.getElementById("winnerText").innerText = text;
    document.getElementById("restartMenu").style.display = "block";
}

function resetPositions() {
    player.x = 250; player.y = 200; player.percentage = 0; player.speedY = 0; player.hitstunt = 0; player.jumpsLeft = 2;
    enemy.x = 580; enemy.y = 200; enemy.percentage = 0; enemy.speedX = 0; enemy.speedY = 0; enemy.isFlying = false; enemy.attackCooldown = 0;
    bullets = []; particles = []; hitEffects = [];
}

function backToMenu() {
    document.getElementById("restartMenu").style.display = "none";
    document.getElementById("gameUi").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

function gameLoop() {
    update(); draw(); requestAnimationFrame(gameLoop);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 500);
    gradient.addColorStop(0, '#161f30'); gradient.addColorStop(1, '#080d16');
    ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let p of platforms) {
        ctx.fillStyle = "#22303f"; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#00f0ff"; ctx.fillRect(p.x, p.y, p.w, 4);
    }

    for(let p of particles) {
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    let col = charTypes[currentType].color;
    ctx.fillStyle = col; ctx.fillRect(player.x, player.y, player.w, player.h);

    if (currentType === "Gunner") {
        ctx.fillStyle = col;
        if (player.facing === 1) ctx.fillRect(player.x + player.w, player.y + 12, 15, 8);
        else ctx.fillRect(player.x - 15, player.y + 12, 15, 8);
    } 
    else if (currentType === "Swordfighter") {
        ctx.save(); ctx.fillStyle = "#00FFFF";
        if (player.isAttacking > 0) {
            if (player.facing === 1) { ctx.translate(player.x + player.w, player.y + 20); ctx.rotate(Math.PI/4); } 
            else { ctx.translate(player.x, player.y + 20); ctx.rotate(-Math.PI/4); }
        } else {
            if (player.facing === 1) { ctx.translate(player.x + player.w - 5, player.y + 10); ctx.rotate(-Math.PI/6); } 
            else { ctx.translate(player.x + 5, player.y + 10); ctx.rotate(Math.PI/6); }
        }
        ctx.fillRect(-2, -25, 4, 25); ctx.fillStyle = "#999"; ctx.fillRect(-4, -2, 8, 3);
        ctx.restore();
    } 
    else if (currentType === "Brawler") {
        ctx.fillStyle = "#FFA500";
        let punchOut = player.isAttacking > 0 ? 12 : 0;
        if (player.facing === 1) {
            ctx.beginPath(); ctx.arc(player.x + player.w + punchOut, player.y + 15, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.x + player.w - 5, player.y + 25, 5, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.beginPath(); ctx.arc(player.x - punchOut, player.y + 15, 6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(player.x + 5, player.y + 25, 5, 0, Math.PI*2); ctx.fill();
        }
    }

    // Tegenstander
    ctx.fillStyle = enemy.color; ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);
    ctx.fillStyle = "#FFF"; ctx.fillRect(enemy.x + (enemy.x <= player.x ? 18 : 4), enemy.y + 8, 8, 4);

    for (let b of bullets) { ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h); }

    for (let h of hitEffects) {
        ctx.save(); ctx.globalAlpha = h.timer / 10; ctx.fillStyle = h.color;
        ctx.beginPath(); ctx.arc(h.x, h.y, h.radius * (1 - h.timer/10), 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#FFF"; ctx.font = "bold 16px sans-serif";
        ctx.fillText("BOOM!", h.x - 25, h.y + 5);
        ctx.restore();
    }

    // UI
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(40, 20, 260, 40);
    ctx.strokeStyle = col; ctx.strokeRect(40, 20, 260, 40);
    ctx.fillStyle = "#FFF"; ctx.font = "bold 13px sans-serif";
    ctx.fillText(`JIJ (${player.score} WINS)`, 50, 45);
    ctx.fillStyle = col; ctx.font = "bold 18px sans-serif";
    ctx.fillText(`${player.percentage}%`, 235, 46);

    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(600, 20, 260, 40);
    ctx.strokeStyle = enemy.color; ctx.strokeRect(600, 20, 260, 40);
    ctx.fillStyle = "#FFF"; ctx.font = "bold 13px sans-serif";
    ctx.fillText(`BOT (${enemy.score} WINS)`, 615, 45);
    ctx.fillStyle = enemy.color; ctx.font = "bold 18px sans-serif";
    ctx.fillText(`${enemy.percentage}%`, 805, 46);
}
</script>

</body>
</html>

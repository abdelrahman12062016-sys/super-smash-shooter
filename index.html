<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Super Smash Shooter - Pro Edition</title>
    <style>
        body {
            margin: 0;
            background: #0b0e14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        h2 {
            text-shadow: 0 0 10px #00f0ff;
            font-size: 28px;
            margin-top: 30px;
        }
        /* Mooiere knoppen voor het menu */
        .menu-btn {
            background: linear-gradient(135deg, #1f2d3d, #0d1520);
            color: white;
            border: 2px solid #00f0ff;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: 0.2s;
        }
        .menu-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            transform: scale(1.05);
        }
        #menu { margin-top: 100px; }
        canvas {
            display: block;
            margin: 20px auto;
            border: 3px solid #3a4750;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }
        .controls { color: #8a99a8; font-size: 14px; }
        .controls b { color: #fff; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>SUPER SMASH SHOOTER</h2>
        <p style="color: #657786;">Kies je vechter om de arena te betreden</p>
        <button class="menu-btn" style="border-color: #00FF00;" onclick="selectCharacter('Gunner')">🔫 GLITCH-GUNNER</button>
        <button class="menu-btn" style="border-color: #00FFFF;" onclick="selectCharacter('Swordfighter')">⚔️ SWORD-FIGHTER</button>
        <button class="menu-btn" style="border-color: #FFA500;" onclick="selectCharacter('Brawler')">🥊 CYBER-BRAWLER</button>
    </div>

    <div id="gameUi" style="display: none;">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        <p class="controls">Besturing: <b>A/D</b> of <b>Pijltjes</b> = Lopen | <b>W / Spatie</b> = Springen & Dubbelklik Spatie = Aanvallen</p>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- GAME INSTELLINGEN ---
const gravity = 0.5;
let currentType = "Gunner";

const charTypes = {
    Gunner: { color: "#00FF00", attackType: "shoot", damage: 12, knockback: 0.14, name: "GLITCH-GUNNER" },
    Swordfighter: { color: "#00FFFF", attackType: "slash", damage: 22, knockback: 0.22, name: "SWORD-FIGHTER" },
    Brawler: { color: "#FFA500", attackType: "punch", damage: 38, knockback: 0.38, name: "CYBER-BRAWLER" }
};

// --- PLATFORMEN (X, Y, Breedte, Hoogte) ---
const platforms = [
    { x: 100, y: 420, w: 700, h: 40 },  // Hoofdplatform (zwevende eiland)
    { x: 200, y: 300, w: 200, h: 15 },  // Linkerhoogte
    { x: 500, y: 300, w: 200, h: 15 }   // Rechterhoogte
];

const player = {
    x: 250, y: 200, w: 30, h: 40, speed: 5.5, speedY: 0, isGrounded: false, percentage: 0, hitstunt: 0, facing: 1
};

const enemy = {
    x: 600, y: 200, w: 30, h: 40, color: "#FF3333", speed: 2.2, speedY: 0, speedX: 0, isGrounded: false, percentage: 0, isFlying: false
};

let bullets = [];
let particles = [];
let hitEffects = [];
let keys = {};

window.addEventListener("keydown", (e) => {
    keys[e.code] = true;
    // Aanvallen met Spatiebalk (als we niet in hitstunt zitten)
    if (e.code === "Space" && player.hitstunt <= 0 && document.getElementById("menu").style.display === "none") {
        // Alleen aanvallen als we niet tegelijk omhoog lopen (Spatie is ook springen, dus we checken of we willen aanvallen)
        executeAttack();
    }
});
window.addEventListener("keyup", (e) => keys[e.code] = false);

function selectCharacter(type) {
    currentType = type;
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameUi").style.display = "block";
    player.percentage = 0; enemy.percentage = 0;
    enemy.x = 600; player.x = 250;
    if(!window.gameStarted) { window.gameStarted = true; gameLoop(); }
}

function spawnParticle(x, y, color, count=5, speed=3) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * speed,
            vy: (Math.random() - 0.5) * speed,
            radius: Math.random() * 3 + 1,
            color: color,
            alpha: 1,
            life: 20 + Math.random() * 10
        });
    }
}

function executeAttack() {
    let stats = charTypes[currentType];
    if (stats.attackType === "shoot") {
        bullets.push({ x: player.x + (player.facing === 1 ? player.w : -15), y: player.y + 15, vx: player.facing * 14, w: 15, h: 6, color: stats.color });
    } else {
        let range = stats.attackType === "slash" ? 65 : 45;
        let attackX = player.facing === 1 ? player.x + player.w : player.x - range;
        
        // Voeg slash visueel effect toe
        hitEffects.push({ x: attackX + range/2, y: player.y + 20, radius: range/2, type: "slash", timer: 8, color: stats.color });

        if (attackX < enemy.x + enemy.w && attackX + range > enemy.x && player.y < enemy.y + enemy.h && player.y + player.h > enemy.y) {
            triggerHit(stats.damage, stats.knockback);
        }
    }
}

function triggerHit(damage, knockbackFactor) {
    enemy.percentage += damage;
    // Richting van de klap bepalen
    let dir = player.x < enemy.x ? 1 : -1;
    enemy.speedX = dir * (4 + (enemy.percentage * knockbackFactor));
    enemy.speedY = -3 - (enemy.percentage * 0.06);
    enemy.isFlying = true;
    enemy.isGrounded = false;

    // "BOOM!" Hit effect spawnen
    hitEffects.push({ x: enemy.x + enemy.w/2, y: enemy.y + enemy.h/2, radius: 35, type: "boom", timer: 12, color: "#FFCC00" });
    spawnParticle(enemy.x + enemy.w/2, enemy.y + enemy.h/2, "#FF3300", 15, 6);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function checkPlatformCollision(obj, oldY) {
    obj.isGrounded = false;
    for (let p of platforms) {
        // Check of het object bovenop het platform landt
        if (obj.x + obj.w > p.x && obj.x < p.x + p.w) {
            if (oldY + obj.h <= p.y && obj.y + obj.h >= p.y) {
                obj.y = p.y - obj.h;
                obj.speedY = 0;
                obj.isGrounded = true;
            }
        }
    }
}

function update() {
    // --- SPELER ---
    let oldPlayerY = player.y;
    if (player.hitstunt > 0) player.hitstunt--;

    if (player.hitstunt <= 0) {
        if (keys["ArrowLeft"] || keys["KeyA"]) { player.x -= player.speed; player.facing = -1; }
        if (keys["ArrowRight"] || keys["KeyD"]) { player.x += player.speed; player.facing = 1; }
        if ((keys["ArrowUp"] || keys["KeyW"]) && player.isGrounded) { 
            player.speedY = -11.5; 
            player.isGrounded = false; 
            spawnParticle(player.x + player.w/2, player.y + player.h, charTypes[currentType].color, 8, 2);
        }
    }
    player.speedY += gravity;
    player.y += player.speedY;
    checkPlatformCollision(player, oldPlayerY);

    // --- TEGENSTANDER (AI) ---
    let oldEnemyY = enemy.y;
    if (!enemy.isFlying) {
        if (enemy.x < player.x) enemy.x += enemy.speed;
        else if (enemy.x > player.x) enemy.x -= enemy.speed;

        // AI Springt soms als hij lager is dan de speler
        if (player.y < enemy.y && enemy.isGrounded && Math.random() < 0.02) {
            enemy.speedY = -11;
            enemy.isGrounded = false;
        }

        // AI valt jou aan
        if (Math.abs(enemy.x - player.x) < 35 && Math.abs(enemy.y - player.y) < 35) {
            player.percentage += 15;
            player.hitstunt = 12;
            let dir = enemy.x < player.x ? 1 : -1;
            player.speedY = -4;
            player.x += dir * (3 + player.percentage * 0.12);
            hitEffects.push({ x: player.x + player.w/2, y: player.y + player.h/2, radius: 25, type: "boom", timer: 10, color: "#FF3333" });
            spawnParticle(player.x + player.w/2, player.y + player.h/2, "#FF0055", 10, 4);
        }
    } else {
        enemy.x += enemy.speedX;
        enemy.speedX *= 0.97;
        // Rookspoor achterlaten als hij hard vliegt
        if(Math.abs(enemy.speedX) > 2) {
            spawnParticle(enemy.x + enemy.w/2, enemy.y + enemy.h/2, "#FF5555", 1, 1);
        }
        if (Math.abs(enemy.speedX) < 0.2) enemy.isFlying = false;
    }
    enemy.speedY += gravity;
    enemy.y += enemy.speedY;
    checkPlatformCollision(enemy, oldEnemyY);

    // --- KOGELS ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        if (b.x < enemy.x + enemy.w && b.x + b.w > enemy.x && b.y < enemy.y + enemy.h && b.y + b.h > enemy.y) {
            triggerHit(charTypes["Gunner"].damage, charTypes["Gunner"].knockback);
            bullets.splice(i, 1);
            continue;
        }
        if (b.x > canvas.width || b.x < -20) bullets.splice(i, 1);
    }

    // --- DEELTJES & EFFECTEN ---
    for(let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life--; p.alpha = p.life / 30;
        if(p.life <= 0) particles.splice(i, 1);
    }
    for(let i = hitEffects.length - 1; i >= 0; i--) {
        hitEffects[i].timer--;
        if(hitEffects[i].timer <= 0) hitEffects.splice(i, 1);
    }

    // --- RESPAWNS (Als je uit het scherm vliegt) ---
    if (enemy.x > canvas.width + 100 || enemy.x < -150 || enemy.y > canvas.height + 100) {
        enemy.x = 550; enemy.y = 100; enemy.percentage = 0; enemy.speedX = 0; enemy.speedY = 0;
        hitEffects.push({ x: 550, y: 150, radius: 50, type: "boom", timer: 15, color: "#00f0ff" });
    }
    if (player.x > canvas.width + 100 || player.x < -150 || player.y > canvas.height + 100) {
        player.x = 250; player.y = 100; player.percentage = 0; player.speedY = 0;
        hitEffects.push({ x: 250, y: 150, radius: 50, type: "boom", timer: 15, color: "#00FF00" });
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. SCI-FI ACHTERGROND TEKENEN
    let gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 500);
    gradient.addColorStop(0, '#1a2639');
    gradient.addColorStop(1, '#080d16');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // De gloeiende planeet op de achtergrond
    ctx.fillStyle = "rgba(0, 240, 255, 0.05)";
    ctx.beginPath(); ctx.arc(750, 120, 90, 0, Math.PI*2); ctx.fill();

    // 2. PLATFORMEN TEKENEN (Met neon randjes)
    for (let p of platforms) {
        ctx.fillStyle = "#22303f";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = "#00f0ff"; // Neon bovenkant rand
        ctx.fillRect(p.x, p.y, p.w, 4);
    }

    // 3. DEELTJES (Particles)
    for(let p of particles) {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    // 4. SPELER & VIJAND (Met gloed-effect)
    ctx.shadowBlur = 10;
    ctx.shadowColor = charTypes[currentType].color;
    ctx.fillStyle = charTypes[currentType].color;
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.shadowColor = enemy.color;
    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.height);
    ctx.shadowBlur = 0; // Gloed weer uitzetten voor de rest

    // Kogels tekenen (lasers!)
    for (let b of bullets) {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    // 5. HIT EFFECTS (De "BOOM" explosies)
    for (let h of hitEffects) {
        ctx.save();
        ctx.globalAlpha = h.timer / 12;
        ctx.fillStyle = h.color;
        ctx.beginPath();
        if(h.type === "boom") {
            ctx.arc(h.x, h.y, h.radius * (1 - h.timer/12), 0, Math.PI*2);
            ctx.fillText("BOOM!", h.x - 25, h.y - 4);
        } else {
            ctx.rect(h.x - h.radius, h.y - 10, h.radius * 2, 20);
        }
        ctx.fill();
        ctx.restore();
    }

    // 6. HUD / DESIGN PERCENTAGE BALKEN (Bovenin het scherm)
    // Jouw balk
    ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(40, 25, 250, 35);
    ctx.strokeStyle = charTypes[currentType].color; ctx.strokeRect(40, 25, 250, 35);
    ctx.fillStyle = "#FFF"; ctx.font = "bold 14px sans-serif";
    ctx.fillText(charTypes[currentType].name, 50, 47);
    ctx.fillStyle = charTypes[currentType].color; ctx.font = "bold 18px sans-serif";
    ctx.fillText(player.percentage + "%", 230, 48);

    // Vijand balk
    ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(610, 25, 250, 35);
    ctx.strokeStyle = enemy.color; ctx.strokeRect(610, 25, 250, 35);
    ctx.fillStyle = "#FFF"; ctx.font = "bold 14px sans-serif";
    ctx.fillText("CRIMSON-BOT", 620, 47);
    ctx.fillStyle = enemy.color; ctx.font = "bold 18px sans-serif";
    ctx.fillText(enemy.percentage + "%", 800, 48);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Super Smash Bros HTML</title>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: sans-serif;
            text-align: center;
        }
        canvas {
            background: #333;
            display: block;
            margin: 10px auto;
            border: 4px solid #fff;
        }
        .menu-btn {
            background: #555;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .menu-btn:hover { background: #777; }
        #menu { margin-top: 50px; }
    </style>
</head>
<body>

    <!-- 1. KARAKTER KIEZERS -->
    <div id="menu">
        <h2>Kies je vechter:</h2>
        <button class="menu-btn" onclick="selectCharacter('Gunner')">🔫 Gunner (Schieten)</button>
        <button class="menu-btn" onclick="selectCharacter('Swordfighter')">⚔️ Swordfighter (Zwaard)</button>
        <button class="menu-btn" onclick="selectCharacter('Brawler')">🥊 Brawler (Vuisten)</button>
    </div>

    <!-- 2. HET SPELSCHERM (EERST VERBORGEN) -->
    <div id="gameUi" style="display: none;">
        <h1 id="charTitle">Super Smash</h1>
        <p>Besturing: <b>A/D</b> of <b>Pijltjes</b> = Lopen | <b>W</b> of <b>Pijltje Omhoog</b> = Springen | <b>Spatiebalk</b> = Aanvallen</p>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const groundY = 320;
const gravity = 0.6;

// Karakter types met hun unieke krachten
const charTypes = {
    Gunner: { color: "#00FF00", attackType: "shoot", damage: 15, knockbackFactor: 0.1, range: 40 },
    Swordfighter: { color: "#00FFFF", attackType: "slash", damage: 25, knockbackFactor: 0.2, range: 70 },
    Brawler: { color: "#FFA500", attackType: "punch", damage: 40, knockbackFactor: 0.35, range: 50 }
};

let currentType = "Gunner";

// De Speler
const player = {
    x: 100, y: groundY - 40, width: 30, height: 40,
    speed: 5, speedY: 0, isGrounded: true,
    percentage: 0, hitstunt: 0
};

// De Tegenstander (AI)
const enemy = {
    x: 600, y: groundY - 40, width: 30, height: 40,
    color: "#FF0000", speed: 2.5, speedY: 0, speedX: 0, isGrounded: true,
    percentage: 0, isFlying: false, attackCooldown: 0
};

let bullets = [];
let visualAttacks = []; // Voor de zwaard- en vuist-effecten
let keys = {};

window.addEventListener("keydown", (e) => keys[e.code] = true);
window.addEventListener("keyup", (e) => keys[e.code] = false);

// Karakter selecteren en spel starten
function selectCharacter(type) {
    currentType = type;
    document.getElementById("menu").style.display = "none";
    document.getElementById("gameUi").style.display = "block";
    document.getElementById("charTitle").innerText = "Super Smash: " + type;
    
    // Reset spelstand
    player.percentage = 0;
    enemy.percentage = 0;
    enemy.x = 600;
    player.x = 100;
    
    // Start de loop als die nog niet draait
    if(!window.gameStarted) {
        window.gameStarted = true;
        gameLoop();
    }
}

// Aanvallen met Spatiebalk
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && player.hitstunt <= 0) {
        let stats = charTypes[currentType];
        
        if (stats.attackType === "shoot") {
            // Gunner schiet een kogel
            bullets.push({ x: player.x + player.width, y: player.y + 15, width: 15, height: 6, speed: 12 });
        } else {
            // Swordfighter of Brawler slaat vlak voor zich uit
            let attackX = player.x + player.width;
            let attackWidth = stats.range;
            
            // Teken een tijdelijk effect op het scherm
            visualAttacks.push({ x: attackX, y: player.y, width: attackWidth, height: player.height, timer: 6, color: stats.color });

            // Check of de vijand binnen het bereik van de klap staat
            if (attackX + attackWidth > enemy.x && player.x < enemy.x + enemy.width && player.y + player.height > enemy.y && player.y < enemy.y + enemy.height) {
                hitEnemy(stats.damage, stats.knockbackFactor);
            }
        }
    }
});

function hitEnemy(damage, factor) {
    enemy.percentage += damage;
    enemy.speedX = 3 + (enemy.percentage * factor);
    enemy.speedY = -2 - (enemy.percentage * 0.05); // Vliegt ook een stukje omhoog!
    enemy.isFlying = true;
    enemy.isGrounded = false;
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

function update() {
    // --- SPELER LOGICA ---
    if (player.hitstunt > 0) player.hitstunt--;

    if (player.hitstunt <= 0) {
        if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= player.speed;
        if (keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;
        
        // Springen
        if ((keys["ArrowUp"] || keys["KeyW"]) && player.isGrounded) {
            player.speedY = -12;
            player.isGrounded = false;
        }
    }

    // Zwaartekracht voor speler
    player.speedY += gravity;
    player.y += player.speedY;

    if (player.y >= groundY - player.height) {
        player.y = groundY - player.height;
        player.speedY = 0;
        player.isGrounded = true;
    }

    // --- TEGENSTANDER (AI) LOGICA ---
    if (!enemy.isFlying) {
        // AI loopt heel simpel richting de speler
        if (enemy.x < player.x) {
            enemy.x += enemy.speed;
        } else if (enemy.x > player.x) {
            enemy.x -= enemy.speed;
        }

        // AI valt jou aan als hij super dichtbij is!
        if (Math.abs(enemy.x - player.x) < 40 && Math.abs(enemy.y - player.y) < 40) {
            if (enemy.attackCooldown <= 0) {
                player.percentage += 20;
                player.hitstunt = 15; // Speler kan even niks doen door de klap!
                
                // Speler krijgt knockback naar links!
                player.speedY = -5;
                player.x -= (3 + player.percentage * 0.1);
                enemy.attackCooldown = 40; // Wacht even voor volgende aanval
            }
        }
    } else {
        // Vijand vliegt weg door een hit
        enemy.x += enemy.speedX;
        enemy.speedX *= 0.96; // Afremmen
        
        if (enemy.speedX < 0.2) {
            enemy.isFlying = false;
            enemy.speedX = 0;
        }
    }

    if (enemy.attackCooldown > 0) enemy.attackCooldown--;

    // Zwaartekracht voor vijand
    enemy.speedY += gravity;
    enemy.y += enemy.speedY;

    if (enemy.y >= groundY - enemy.height) {
        enemy.y = groundY - enemy.height;
        enemy.speedY = 0;
        enemy.isGrounded = true;
    }

    // --- KOGELS UPDATE ---
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.speed;

        if (b.x < enemy.x + enemy.width && b.x + b.width > enemy.x && b.y < enemy.y + enemy.height && b.y + b.height > enemy.y) {
            let stats = charTypes["Gunner"];
            hitEnemy(stats.damage, stats.knockbackFactor);
            bullets.splice(i, 1);
            continue;
        }
        if (b.x > canvas.width) bullets.splice(i, 1);
    }

    // Effecten-timer updaten
    for (let i = visualAttacks.length - 1; i >= 0; i--) {
        visualAttacks[i].timer--;
        if (visualAttacks[i].timer <= 0) visualAttacks.splice(i, 1);
    }

    // --- RESPAWNS ---
    if (enemy.x > canvas.width || enemy.x < -40 || enemy.y > canvas.height) {
        enemy.x = 500;
        enemy.y = groundY - 40;
        enemy.percentage = 0;
        enemy.speedX = 0;
        enemy.speedY = 0;
    }
    if (player.x > canvas.width || player.x < -40 || player.y > canvas.height) {
        player.x = 100;
        player.y = groundY - 40;
        player.percentage = 0;
        player.speedY = 0;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Vloer
    ctx.fillStyle = "#555";
    ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

    // Speler (Jouw kleur verandert nu per klasse!)
    ctx.fillStyle = charTypes[currentType].color;
    ctx.fillRect(player.x, player.y, player.width, player.height);

    // Tegenstander (Rood)
    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

    // Kogels
    ctx.fillStyle = "#FFFF00";
    for (let b of bullets) ctx.fillRect(b.x, b.y, b.width, b.height);

    // Slaan/Zwaard effecten tekenen
    for (let va of visualAttacks) {
        ctx.fillStyle = va.color;
        ctx.globalAlpha = 0.4; // Beetje doorzichtig maken
        ctx.fillRect(va.x, va.y, va.width, va.height);
        ctx.globalAlpha = 1.0;
    }

    // GUI: Percentages op het scherm
    ctx.fillStyle = "#FFF";
    ctx.font = "bold 18px sans-serif";
    ctx.fillText("Jij: " + player.percentage + "%", 50, 50);
    ctx.fillText("Tegenstander: " + enemy.percentage + "%", 600, 50);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Super Smash Shooter - Cyber AI</title>
    <style>
        body { margin: 0; background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        #menu { margin-top: 100px; }
        .menu-btn { background: #1f2d3d; color: white; border: 2px solid #00f0ff; padding: 15px 30px; cursor: pointer; margin: 10px; font-weight: bold; border-radius: 8px; }
        #gameUi { display: none; }
        canvas { display: block; margin: 20px auto; border: 3px solid #00f0ff; border-radius: 10px; background: #080d16; }
    </style>
</head>
<body>

    <div id="menu">
        <h2>CYBER SMASH SHOOTER</h2>
        <button class="menu-btn" onclick="selectCharacter('Gunner')">🔫 GLITCH-GUNNER</button>
        <button class="menu-btn" onclick="selectCharacter('Swordfighter')">⚔️ SWORD-FIGHTER</button>
        <button class="menu-btn" onclick="selectCharacter('Brawler')">🥊 CYBER-BRAWLER</button>
    </div>

    <div id="gameUi">
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <script src="game.js"></script>
</body>
</html>
